<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIMON AHMED - Portfolio</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* একদম উপর থেকে শুরু করার জন্য */
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px; /* উপরের দিকে কিছুটা জায়গা রাখা হয়েছে */
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
            color: white;
        }

        /* RGB নাম */
        .rgb-text {
            font-size: 70px; /* নাম আরও বড় করা হয়েছে */
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 400% 400%;
            animation: rainbow-animation 5s ease infinite;
            margin-bottom: 10px;
        }

        /* ফেসবুক বাটন স্টাইল */
        .fb-link {
            text-decoration: none;
            background-color: #1877F2; /* ফেসবুকের নীল রঙ */
            color: white;
            padding: 12px 25px;
            font-size: 20px;
            border-radius: 30px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            margin-bottom: 30px;
            display: inline-block;
            transition: transform 0.3s, background-color 0.3s;
        }

        .fb-link:hover {
            background-color: #145dbf;
            transform: scale(1.1); /* মাউস নিলে বাটন বড় হবে */
        }

        @keyframes rainbow-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
        }

        img {
            max-width: 80%;
            height: auto;
            border: 3px solid #444;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="rgb-text">LIMON AHMED</h1>

        <a href="https://www.facebook.com/yllimon1" target="_blank" class="fb-link">
            Facebook
        </a>

        <br>

        <img src="IMG_20260116_172125.png" alt="LIMON AHMED">
    </div>

</body>
</html>
