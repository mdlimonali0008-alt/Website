<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Limon Ali - Portfolio</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }

        /* MD LIMON ALI - বড় ও স্টাইলিশ */
        .rgb-text-main {
            font-size: clamp(50px, 12vw, 120px);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 400% 400%;
            animation: rainbow-animation 5s ease infinite;
            margin-bottom: 10px;
            line-height: 1;
        }

        /* I am a Freelancer - টাইপিং অ্যানিমেশন ও বড় সাইজ */
        .typing-container {
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 700;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            border-right: 3px solid #00ffcc; /* কার্সার এফেক্ট */
            white-space: nowrap;
            overflow: hidden;
            width: 0; /* শুরুতে লুকানো থাকবে */
            animation: typing 3s steps(20, end) forwards, blink 0.6s step-end infinite;
        }

        /* বাটন এরিয়া */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        /* সাধারণ বাটন স্টাইল */
        .btn {
            text-decoration: none;
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        /* ফেসবুক বাটন */
        .fb-link {
            background-color: #1877F2;
            box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);
        }

        /* ইমেইল বাটন - লাল রঙের (Gmail থিম) */
        .email-link {
            background-color: #D44638;
            box-shadow: 0 4px 15px rgba(212, 70, 56, 0.4);
        }

        .btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
        }

        /* ইমেজ স্টাইল */
        .profile-img {
            max-width: 350px;
            width: 100%;
            height: auto;
            border-radius: 20px;
            border: 2px solid #333;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
        }

        /* About সেকশন */
        .about-section {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
            line-height: 1.6;
            border: 1px solid #222;
        }

        .about-title {
            font-size: 28px;
            color: #00ff00;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #444;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Animations */
        @keyframes rainbow-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #00ffcc }
        }
    </style>
</head>
<body>

    <h1 class="rgb-text-main">MD LIMON ALI</h1>
    
    <div class="typing-container">I am a Freelancer</div>

    <div class="button-group">
        <a href="https://www.facebook.com/yllimon1" target="_blank" class="btn fb-link">
            Facebook
        </a>

        <a href="Mdlimonali62@gmail.com" target="_blank" class="btn email-link">
            E-mail
        </a>
    </div>

    <img src="IMG_20260116_172125.png" alt="Md Limon Ali" class="profile-img">

    <div class="about-section">
        <div class="about-title">ABOUT</div>
        <p style="color: #ccc; text-align: justify; font-size: 17px;">
            Md Limon Ali is a Bangladeshi entrepreneur and founder of Subgire. He started his company in 2022 and has been known as an entrepreneur ever since. His real name is Md Limon Ali. He was born in 2004 in Dhanbari, Dhaka.
        </p>
    </div>

</body>
</html>
